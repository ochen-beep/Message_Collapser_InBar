<div class="message-collapser-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Message Collapser</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <!-- Master Enable/Disable Toggle -->
            <div class="mc-inbar-block flex-container">
                <input id="mc-inbar-master-enable" type="checkbox" />
                <label for="mc-inbar-master-enable">Enable Message Collapser</label>
            </div>

            <hr class="sysHR" />

            <!-- Action buttons: excluded messages -->
            <div class="mc-inbar-block flex-container">
                <input id="mc-inbar-collapse-disabled"
                       class="menu_button"
                       type="button"
                       value="Collapse Excluded" />
                <input id="mc-inbar-expand-disabled"
                       class="menu_button"
                       type="button"
                       value="Expand Excluded" />
            </div>

            <!-- Action buttons: all messages -->
            <div class="mc-inbar-block flex-container">
                <input id="mc-inbar-collapse-all"
                       class="menu_button"
                       type="button"
                       value="Collapse All" />
                <input id="mc-inbar-expand-all"
                       class="menu_button"
                       type="button"
                       value="Expand All" />
            </div>

            <hr class="sysHR" />

        </div>
    </div>
</div>
